<div
  class="overflow-hidden transition-all duration-300 ease-in-out mb-2"
  [class.max-h-0]="!isChangeSpriteSectionOpen"
  [class.opacity-0]="!isChangeSpriteSectionOpen"
  [class.opacity-100]="isChangeSpriteSectionOpen"
>
  <div class="mt-3 p-4 bg-slate-700/50 rounded-lg text-center pixel-box-s">
    <ul class="space-y-4">
      <li>
        Aclaracion las animaciones a subir deben ser Set de animaciones y se debe especificar el
        tamaña del sprite para subirlo
      </li>
      <li class="mb-4 flex justify-center gap-4 items-center">
        <label for="sprite-width">Ancho:</label>
        <input type="number" class="pixel-box-s text-white" id="sprite-width" [value]="width" class="w-20 px-2 rounded text-black" min="16" />
        <label for="sprite-height">Alto:</label>
        <input type="number" class="pixel-box-s text-white" id="sprite-height" [value]="height" class="w-20 px-2 rounded text-black" min="16" />
      </li>
      @for (key of getKeys(); track $index) {
        <li class="flex flex-col items-start gap-2">
          <span
            >Nombre de la animación: <span class="text-amber-200">{{ key }}</span></span
          >
          <input
            type="file"
            [id]="key"
            (change)="onFileChange($event, key)"
            class="clickable block w-full text-sm text-gray-200 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600"
          />
        </li>
      }
    </ul>
  </div>
</div>
